<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Revenue Forecast</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:        #0d0d0d;
    --surface:   #141414;
    --surface2:  #1a1a1a;
    --border:    #2a2a2a;
    --accent:    #ff8400;
    --accent-dim:#ff840033;
    --accent2:   #ffb347;
    --m1color:   #ff8400;
    --m2color:   #ffffff;
    --m2i-color: #ff8400;
    --realcolor: #ffffff;
    --text:      #f0f0f0;
    --muted:     #666;
    --success:   #ff8400;
    --danger:    #ff4444;
    --forecast:  #a78bfa;
    --forecast-dim: rgba(167,139,250,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,132,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,132,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
  }

  .container { position:relative; z-index:1; max-width:1340px; margin:0 auto; padding:40px 24px; }

  header {
    display:flex; align-items:flex-end; gap:16px;
    margin-bottom:40px; padding-bottom:24px;
    border-bottom:1px solid var(--border);
    justify-content:space-between;
  }

  .header-left { display:flex; align-items:flex-end; gap:16px; }

  .logo-mark {
    width:44px; height:44px;
    background: linear-gradient(135deg, var(--accent), #ff5500);
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:#000;
    flex-shrink:0;
  }

  h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:28px; letter-spacing:-0.5px; line-height:1; }
  h1 span { color:var(--accent); }
  .subtitle { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }

  .nav-link {
    font-family:'Syne',sans-serif; font-weight:700; font-size:11px;
    letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); text-decoration:none;
    border:1px solid var(--border); border-radius:8px;
    padding:8px 14px; transition:all 0.2s;
    display:flex; align-items:center; gap:6px;
  }
  .nav-link:hover { color:var(--accent); border-color:var(--accent); background:var(--accent-dim); }

  /* ── Deep-link context banner ── */
  .context-banner {
    display:none; align-items:center; gap:12px; flex-wrap:wrap;
    background:var(--forecast-dim); border:1px solid rgba(167,139,250,0.3);
    border-radius:12px; padding:12px 18px; margin-bottom:20px;
    font-size:12px; color:var(--forecast);
  }
  .context-banner.visible { display:flex; }
  .context-banner strong { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; }
  .context-banner-dismiss {
    margin-left:auto; cursor:pointer; font-size:14px; color:var(--muted);
    background:none; border:none; line-height:1;
  }
  .context-banner-dismiss:hover { color:var(--text); }

  .layout { display:grid; grid-template-columns:340px 1fr; gap:24px; align-items:start; }
  @media (max-width:900px) { .layout { grid-template-columns:1fr; } }

  .panel { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; }

  .panel-title {
    font-family:'Syne',sans-serif; font-weight:700; font-size:12px;
    letter-spacing:2px; text-transform:uppercase; color:var(--muted);
    margin-bottom:20px; display:flex; align-items:center; gap:8px;
  }
  .panel-title::before { content:''; width:3px; height:14px; background:var(--accent); border-radius:2px; }

  .field { margin-bottom:18px; }

  .field > label {
    display:block; font-size:10px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--muted); margin-bottom:7px;
  }

  .date-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

  /* ── Multi-select box ── */
  .multi-select-wrap { position: relative; }

  .multi-select-trigger {
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-family:'DM Mono',monospace; font-size:12px;
    padding:9px 32px 9px 12px; border-radius:8px; outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
    cursor:pointer; text-align:left;
    display:flex; align-items:center; justify-content:space-between;
    user-select:none;
  }
  .multi-select-trigger:hover,
  .multi-select-trigger.open {
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-dim);
  }
  .multi-select-trigger .arrow {
    font-size:9px; color:var(--muted); transition:transform 0.2s; flex-shrink:0; margin-left:8px;
  }
  .multi-select-trigger.open .arrow { transform:rotate(180deg); }

  .multi-select-dropdown {
    display:none;
    position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:999;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; overflow:hidden;
    box-shadow:0 12px 40px rgba(0,0,0,0.6);
    max-height:220px;
  }
  .multi-select-dropdown.open { display:flex; flex-direction:column; }

  .ms-search { padding:8px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .ms-search input {
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-family:'DM Mono',monospace; font-size:12px;
    padding:6px 10px; border-radius:6px; outline:none; appearance:none;
  }
  .ms-search input:focus { border-color:var(--accent); }

  .ms-list { overflow-y:auto; flex:1; }

  .ms-option {
    display:flex; align-items:center; gap:10px;
    padding:8px 12px; cursor:pointer; font-size:12px;
    transition:background 0.12s;
  }
  .ms-option:hover { background:rgba(255,132,0,0.08); }
  .ms-option.selected { color:var(--accent); }
  .ms-option.all-opt  { border-bottom:1px solid var(--border); font-weight:500; color:var(--accent); }

  .ms-checkbox {
    width:14px; height:14px; border:1px solid var(--border);
    border-radius:3px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    transition:background 0.12s, border-color 0.12s;
  }
  .ms-option.selected .ms-checkbox { background:var(--accent); border-color:var(--accent); }
  .ms-option.selected .ms-checkbox::after { content:'✓'; font-size:9px; color:#000; }

  .ms-tags { display:flex; flex-wrap:wrap; gap:4px; min-height:16px; }
  .ms-tag {
    display:inline-flex; align-items:center; gap:4px;
    background:rgba(255,132,0,0.15); color:var(--accent);
    border:1px solid rgba(255,132,0,0.3);
    border-radius:4px; padding:2px 6px; font-size:11px;
  }
  .ms-tag .rm { cursor:pointer; opacity:0.6; font-size:10px; }
  .ms-tag .rm:hover { opacity:1; }

  select, input[type=text] {
    width:100%; background:var(--bg); border:1px solid var(--border);
    color:var(--text); font-family:'DM Mono',monospace; font-size:13px;
    padding:10px 14px; border-radius:8px; outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
    appearance:none; -webkit-appearance:none;
  }
  select:focus, input[type=text]:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-dim);
  }
  select option { background:#1a1a1a; }
  .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }

  /* ── Model toggle ── */
  .model-toggle {
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px;
    background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:4px;
  }
  .model-toggle input[type="radio"] { display:none; }
  .model-toggle label {
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:8px 5px; border-radius:7px; cursor:pointer;
    font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--muted);
    transition:all 0.2s; margin:0; white-space:nowrap; border:1px solid transparent;
  }
  .model-toggle label .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .model-toggle input[value="m1"]:checked + label  { background:rgba(255,132,0,0.12); color:var(--m1color); border-color:rgba(255,132,0,0.35); }
  .model-toggle input[value="m2"]:checked + label  { background:rgba(255,255,255,0.06); color:#ccc; border-color:rgba(255,255,255,0.2); }
  .model-toggle input[value="both"]:checked + label{ background:rgba(255,132,0,0.08); color:var(--accent2); border-color:rgba(255,132,0,0.25); }

  /* ── Button ── */
  .btn {
    width:100%; padding:13px;
    background:linear-gradient(135deg, var(--accent), #cc6900);
    border:none; border-radius:10px; color:#000;
    font-family:'Syne',sans-serif; font-weight:700; font-size:13px;
    letter-spacing:1.5px; text-transform:uppercase;
    cursor:pointer; transition:opacity 0.2s, transform 0.1s;
    position:relative; overflow:hidden;
  }
  .btn:hover { opacity:0.9; transform:translateY(-1px); }
  .btn:active { transform:translateY(0); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  .btn .spinner {
    display:none; width:16px; height:16px;
    border:2px solid rgba(0,0,0,0.3); border-top-color:#000;
    border-radius:50%; animation:spin 0.6s linear infinite; margin:0 auto;
  }
  .btn.loading .btn-text { display:none; }
  .btn.loading .spinner  { display:block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Chart panel ── */
  .chart-panel {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:28px; min-height:500px;
    display:flex; flex-direction:column;
  }
  .chart-header {
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:20px; flex-wrap:wrap; gap:12px;
  }
  .chart-title { font-family:'Syne',sans-serif; font-weight:700; font-size:18px; }
  .chart-meta  { font-size:11px; color:var(--muted); margin-top:4px; }

  /* ── Checkbox legend ── */
  .legend { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .legend-cb { display:none; }
  .legend-item {
    display:flex; align-items:center; gap:7px; font-size:11px; letter-spacing:0.5px;
    padding:5px 10px 5px 8px; border-radius:20px; border:1px solid transparent;
    cursor:pointer; user-select:none;
    transition:opacity 0.18s, border-color 0.18s, background 0.18s;
    color:var(--muted);
  }
  .legend-cb:checked + .legend-item { opacity:1; }
  .legend-cb:checked + .legend-item.c-real { color:#fff;            border-color:rgba(255,255,255,0.25); background:rgba(255,255,255,0.06); }
  .legend-cb:checked + .legend-item.c-m1h  { color:var(--m1color); border-color:rgba(255,132,0,0.4);    background:rgba(255,132,0,0.08);   }
  .legend-cb:checked + .legend-item.c-m1c  { color:var(--m1color); border-color:rgba(255,132,0,0.4);    background:rgba(255,132,0,0.08);   }
  .legend-cb:checked + .legend-item.c-m2h  { color:#ccc;           border-color:rgba(255,255,255,0.2);  background:rgba(255,255,255,0.05); }
  .legend-cb:checked + .legend-item.c-m2c  { color:#ccc;           border-color:rgba(255,255,255,0.2);  background:rgba(255,255,255,0.05); }
  .legend-cb:checked + .legend-item.c-m2i  { color:var(--accent2); border-color:rgba(255,179,71,0.45);  background:rgba(255,179,71,0.1);   }
  .legend-cb:not(:checked) + .legend-item  { opacity:0.28; }
  .legend-item:hover { opacity:1 !important; }
  .legend-swatch { width:20px; height:3px; border-radius:2px; flex-shrink:0; }
  .legend-swatch.dashed { background:none !important; border-top:2px dashed currentColor; height:0; margin-top:1px; }
  .legend-swatch.band   { height:10px; border-radius:3px; opacity:0.7; }

  .chart-wrap { flex:1; position:relative; min-height:400px; }

  /* ── Stats ── */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:20px; }
  @media (max-width:700px) { .stats-row { grid-template-columns:repeat(2,1fr); } }
  .stat-card {
    background:var(--bg); border:1px solid var(--border);
    border-radius:10px; padding:14px 16px; position:relative; overflow:hidden;
  }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .stat-card.m1::before      { background:var(--m1color); }
  .stat-card.m2::before      { background:#888; }
  .stat-card.real::before    { background:#fff; }
  .stat-card.neutral::before { background:var(--border); }
  .stat-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .stat-value { font-family:'Syne',sans-serif; font-weight:700; font-size:17px; color:var(--text); }
  .stat-value.m1c  { color:var(--m1color); }
  .stat-value.m2c  { color:#ccc; }

  .empty-state {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    color:var(--muted); gap:12px; padding:60px 0;
  }
  .empty-icon { font-size:40px; opacity:0.3; }
  .empty-text { font-size:13px; text-align:center; line-height:1.6; }

  .error-msg {
    background:rgba(255,68,68,0.08); border:1px solid rgba(255,68,68,0.3);
    color:var(--danger); border-radius:8px; padding:12px 16px;
    font-size:12px; margin-top:12px; display:none;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <div class="logo-mark">RF</div>
      <div>
        <h1>Revenue <span>Forecast</span></h1>
      </div>
    </div>
    <a href="/cagr" class="nav-link">CAGR Analysis →</a>
  </header>

  <!-- Deep-link context banner (shown when arriving from CAGR domain click) -->
  <div class="context-banner" id="context-banner">
    <span>◈</span>
    <span>Forecasting domain <strong id="banner-domain">—</strong> &nbsp;·&nbsp; <span id="banner-period">—</span></span>
    <button class="context-banner-dismiss" onclick="dismissBanner()" title="Dismiss">✕</button>
  </div>

  <div class="layout">

    <!-- ── Sidebar ── -->
    <aside>
      <div class="panel">
        <div class="panel-title">Parameters</div>

        <!-- Products multi-select -->
        <div class="field">
          <label>Products</label>
          <div class="multi-select-wrap" id="ms-product-wrap">
            <button type="button" class="multi-select-trigger" id="ms-product-trigger" onclick="toggleDropdown('product')">
              <span class="ms-tags" id="ms-product-tags"><span style="color:var(--muted);font-size:12px">— Select products —</span></span>
              <span class="arrow">▼</span>
            </button>
            <div class="multi-select-dropdown" id="ms-product-dropdown">
              <div class="ms-search"><input type="text" placeholder="Search…" oninput="filterOptions('product',this.value)" id="ms-product-search"/></div>
              <div class="ms-list" id="ms-product-list"></div>
            </div>
          </div>
        </div>

        <!-- Rep Codes multi-select -->
        <div class="field">
          <label>Rep Codes</label>
          <div class="multi-select-wrap" id="ms-rep-wrap">
            <button type="button" class="multi-select-trigger" id="ms-rep-trigger" onclick="toggleDropdown('rep')">
              <span class="ms-tags" id="ms-rep-tags"><span style="color:var(--muted);font-size:12px">— Select rep codes —</span></span>
              <span class="arrow">▼</span>
            </button>
            <div class="multi-select-dropdown" id="ms-rep-dropdown">
              <div class="ms-search"><input type="text" placeholder="Search…" oninput="filterOptions('rep',this.value)" id="ms-rep-search"/></div>
              <div class="ms-list" id="ms-rep-list"></div>
            </div>
          </div>
        </div>

        <hr class="divider"/>

        <div class="field">
          <label>Start Date</label>
          <div class="date-row">
            <select id="start_year"></select>
            <select id="start_month"></select>
          </div>
        </div>

        <div class="field">
          <label>End Date</label>
          <div class="date-row">
            <select id="end_year"></select>
            <select id="end_month"></select>
          </div>
        </div>

        <hr class="divider"/>

        <div class="field">
          <label>Model</label>
          <div class="model-toggle">
            <input type="radio" name="model" id="opt-m1" value="m1" checked/>
            <label for="opt-m1"><span class="dot" style="background:var(--m1color)"></span>M1</label>
            <input type="radio" name="model" id="opt-m2" value="m2"/>
            <label for="opt-m2"><span class="dot" style="background:#888"></span>M2</label>
            <input type="radio" name="model" id="opt-both" value="both"/>
            <label for="opt-both"><span class="dot" style="background:linear-gradient(90deg,var(--m1color),#888)"></span>Both</label>
          </div>
        </div>

        <hr class="divider"/>

        <button class="btn" id="submit-btn" onclick="runForecast()">
          <span class="btn-text">Run Forecast</span>
          <div class="spinner"></div>
        </button>

        <div class="error-msg" id="error-msg"></div>
      </div>
    </aside>

    <!-- ── Chart panel ── -->
    <main>
      <div class="chart-panel">
        <div class="chart-header">
          <div>
            <div class="chart-title" id="chart-title">Réel vs Prédiction</div>
            <div class="chart-meta"  id="chart-meta">Configure parameters and run forecast</div>
          </div>
          <div class="legend" id="dynamic-legend" role="group"></div>
        </div>

        <div id="empty-state" class="empty-state">
          <div class="empty-icon">◈</div>
          <div class="empty-text">Select products, rep codes,<br/>and date range to generate a forecast.</div>
        </div>

        <div class="chart-wrap" id="chart-wrap" style="display:none">
          <canvas id="myChart"></canvas>
        </div>

        <div class="stats-row" id="stats-row" style="display:none">
          <div class="stat-card real">
            <div class="stat-label">Real Data Points</div>
            <div class="stat-value" id="stat-real">—</div>
          </div>
          <div class="stat-card m1" id="stat-m1-card">
            <div class="stat-label">M1 Last Predicted</div>
            <div class="stat-value m1c" id="stat-m1-last">—</div>
          </div>
          <div class="stat-card m2" id="stat-m2-card">
            <div class="stat-label">M2 Last Predicted</div>
            <div class="stat-value m2c" id="stat-m2-last">—</div>
          </div>
          <div class="stat-card neutral">
            <div class="stat-label">Periods Forecast</div>
            <div class="stat-value" id="stat-periods">—</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const state = {
  products: { all: [], selected: new Set() },
  reps:     { all: [], selected: new Set() },
};

// ═══════════════════════════════════════════════════════════
//  MULTI-SELECT ENGINE
// ═══════════════════════════════════════════════════════════
function toggleDropdown(which) {
  const ddId  = which === 'product' ? 'ms-product-dropdown' : 'ms-rep-dropdown';
  const trgId = which === 'product' ? 'ms-product-trigger'  : 'ms-rep-trigger';
  const dd    = document.getElementById(ddId);
  const trg   = document.getElementById(trgId);
  const isOpen = dd.classList.contains('open');
  document.querySelectorAll('.multi-select-dropdown').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.multi-select-trigger').forEach(el => el.classList.remove('open'));
  if (!isOpen) { dd.classList.add('open'); trg.classList.add('open'); }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.multi-select-wrap')) {
    document.querySelectorAll('.multi-select-dropdown').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.multi-select-trigger').forEach(el => el.classList.remove('open'));
  }
});

function renderList(which) {
  const isProduct = which === 'product';
  const s         = isProduct ? state.products : state.reps;
  const listEl    = document.getElementById(isProduct ? 'ms-product-list' : 'ms-rep-list');
  const search    = document.getElementById(isProduct ? 'ms-product-search' : 'ms-rep-search').value.toLowerCase();
  const filtered  = s.all.filter(v => v.toString().toLowerCase().includes(search));

  let html = `<div class="ms-option all-opt ${s.selected.size===s.all.length&&s.all.length>0?'selected':''}"
                   onclick="toggleAll('${which}')">
                <div class="ms-checkbox"></div>
                Select All
              </div>`;
  filtered.forEach(v => {
    const sel = s.selected.has(v);
    html += `<div class="ms-option ${sel?'selected':''}" onclick="toggleOption('${which}','${String(v).replace(/'/g,"\\'")}')">
               <div class="ms-checkbox"></div>
               <span>${v}</span>
             </div>`;
  });
  listEl.innerHTML = html;
}

function filterOptions(which, _) { renderList(which); }

function toggleOption(which, value) {
  const s = which === 'product' ? state.products : state.reps;
  if (s.selected.has(value)) s.selected.delete(value);
  else s.selected.add(value);
  renderList(which);
  renderTags(which);
  if (which === 'product') loadRepCodes();
}

function toggleAll(which) {
  const s = which === 'product' ? state.products : state.reps;
  if (s.selected.size === s.all.length) s.selected.clear();
  else s.all.forEach(v => s.selected.add(v));
  renderList(which);
  renderTags(which);
  if (which === 'product') loadRepCodes();
}

function renderTags(which) {
  const isProduct = which === 'product';
  const s       = isProduct ? state.products : state.reps;
  const tagsEl  = document.getElementById(isProduct ? 'ms-product-tags' : 'ms-rep-tags');
  if (s.selected.size === 0) {
    tagsEl.innerHTML = `<span style="color:var(--muted);font-size:12px">— Select ${isProduct?'products':'rep codes'} —</span>`;
    return;
  }
  if (s.selected.size === s.all.length) {
    tagsEl.innerHTML = `<span class="ms-tag">All ${isProduct?'products':'rep codes'} (${s.all.length})</span>`;
    return;
  }
  const arr = [...s.selected];
  let html = arr.slice(0, 3).map(v =>
    `<span class="ms-tag">${v}<span class="rm" onclick="event.stopPropagation();toggleOption('${which}','${String(v).replace(/'/g,"\\'")}')">×</span></span>`
  ).join('');
  if (arr.length > 3) html += `<span class="ms-tag">+${arr.length-3}</span>`;
  tagsEl.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════════════════════
async function initProducts() {
  try {
    const pr       = await fetch('/get_products');
    const products = await pr.json();
    state.products.all = products;
    renderList('product');
    renderTags('product');
  } catch(_) {}

  const res  = await fetch('/get_rep_codes?product=');
  const reps = await res.json();
  state.reps.all = reps;
  renderList('rep');
  renderTags('rep');
}

async function loadRepCodes() {
  const products = [...state.products.selected];
  const url = products.length
    ? '/get_rep_codes?product=' + encodeURIComponent(products.join(','))
    : '/get_rep_codes?product=';
  const res  = await fetch(url);
  const reps = await res.json();
  state.reps.selected.forEach(r => { if (!reps.includes(r)) state.reps.selected.delete(r); });
  state.reps.all = reps;
  renderList('rep');
  renderTags('rep');
}

// ═══════════════════════════════════════════════════════════
//  DATES
// ═══════════════════════════════════════════════════════════
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function populateDates(overrides = {}) {
  const cy = new Date().getFullYear();
  const targetEnd   = overrides["end_year"]   ?? cy;
  const targetStart = overrides["start_year"] ?? cy;
  // Ensure the range always covers the requested years
  const rangeMin = Math.min(cy - 15, targetStart);
  const rangeMax = Math.max(cy + 10, targetEnd);
  const years = Array.from({ length: rangeMax - rangeMin + 1 }, (_, i) => rangeMin + i);

  ["start_year","end_year"].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = "";
    years.forEach(y => {
      const o = document.createElement("option");
      o.value = y; o.textContent = y;
      sel.appendChild(o);
    });
  });

  ["start_month","end_month"].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = "";
    MONTHS.forEach((m,i) => {
      const o = document.createElement("option");
      o.value = i+1; o.textContent = m;
      sel.appendChild(o);
    });
  });

  // Apply values AFTER options exist
  document.getElementById("start_year").value  = overrides["start_year"]  ?? cy;
  document.getElementById("start_month").value = overrides["start_month"] ?? (new Date().getMonth() > 0 ? new Date().getMonth() : 1);
  document.getElementById("end_year").value    = overrides["end_year"]    ?? cy;
  document.getElementById("end_month").value   = overrides["end_month"]   ?? (new Date().getMonth() + 1);
}

function dismissBanner() {
  document.getElementById("context-banner").classList.remove("visible");
  // Clean the URL without reloading so back-button still works
  const clean = window.location.pathname;
  window.history.replaceState({}, "", clean);
}

// ═══════════════════════════════════════════════════════════
//  FORMAT
// ═══════════════════════════════════════════════════════════
function fmt(v) {
  if (v==null||!isFinite(v)) return "—";
  if (Math.abs(v)>=1e6) return (v/1e6).toFixed(2)+"M";
  if (Math.abs(v)>=1e3) return (v/1e3).toFixed(1)+"k";
  return v.toFixed(0);
}

// ═══════════════════════════════════════════════════════════
//  SUM HELPER
// ═══════════════════════════════════════════════════════════
function sumSeries(arrOfArrays) {
  const map = {};
  arrOfArrays.forEach(arr => {
    (arr||[]).forEach(({period, value}) => {
      map[period] = (map[period]||0) + (value||0);
    });
  });
  return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).map(([period,value])=>({period,value}));
}

// ═══════════════════════════════════════════════════════════
//  RUN FORECAST
// ═══════════════════════════════════════════════════════════
let chartInstance = null;

function getModel() { return document.querySelector('input[name="model"]:checked').value; }

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg; el.style.display = "block";
}

async function runForecast() {
  const repCodes    = [...state.reps.selected];
  const start_year  = document.getElementById("start_year").value;
  const start_month = document.getElementById("start_month").value;
  const end_year    = document.getElementById("end_year").value;
  const end_month   = document.getElementById("end_month").value;
  const model       = getModel();
  const errEl       = document.getElementById("error-msg");
  const btn         = document.getElementById("submit-btn");

  errEl.style.display = "none";
  if (repCodes.length === 0) { showError("Please select at least one rep code."); return; }

  btn.classList.add("loading"); btn.disabled = true;

  try {
    const responses = await Promise.all(repCodes.map(rep_code =>
      fetch("/predict", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({rep_code, start_year, start_month, end_year, end_month, model})
      }).then(r => r.json())
    ));

    const errs = responses.filter(r => r.error);
    if (errs.length === repCodes.length) { showError(errs[0].error); return; }

    const merged = {
      rep_code:         repCodes.length === 1 ? repCodes[0] : `${repCodes.length} reps`,
      real_points:      sumSeries(responses.map(r => r.real_points)),
      m1_curve1:        sumSeries(responses.map(r => r.m1_curve1)),
      m1_curve2:        sumSeries(responses.map(r => r.m1_curve2)),
      m2_curve1:        sumSeries(responses.map(r => r.m2_curve1)),
      m2_curve2:        sumSeries(responses.map(r => r.m2_curve2)),
      m2_curve2_lower:  sumSeries(responses.map(r => r.m2_curve2_lower)),
      m2_curve2_upper:  sumSeries(responses.map(r => r.m2_curve2_upper)),
      m2_curve1_lower:  sumSeries(responses.map(r => r.m2_curve1_lower)),
      m2_curve1_upper:  sumSeries(responses.map(r => r.m2_curve1_upper)),
    };

    renderChart(merged, model);
  } catch(e) {
    showError("Server error: "+e.message);
  } finally {
    btn.classList.remove("loading"); btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════════
//  CHART
// ═══════════════════════════════════════════════════════════
function toMap(arr) {
  return arr ? Object.fromEntries(arr.map(d=>[d.period,d.value])) : {};
}

function splitCurve(arr, realPeriods) {
  const realPart = arr.map(d => realPeriods.has(d.period) ? d.value : null);
  const predPart = arr.map(d => realPeriods.has(d.period) ? null : d.value);
  const lastReal = realPart.reduce((acc,v,i) => v!==null?i:acc, -1);
  if (lastReal>=0 && lastReal+1<predPart.length) predPart[lastReal] = realPart[lastReal];
  return {realPart, predPart};
}

function renderChart(data, model) {
  document.getElementById("empty-state").style.display = "none";
  document.getElementById("chart-wrap").style.display  = "block";
  document.getElementById("stats-row").style.display   = "grid";


  const realPts     = data.real_points||[];
  const realPeriods = new Set(realPts.map(d=>d.period));
  const c1_m1 = data.m1_curve1||[], c2_m1 = data.m1_curve2||[];
  const c1_m2 = data.m2_curve1||[], c2_m2 = data.m2_curve2||[];
  const lo_m2 = data.m2_curve2_lower||[], hi_m2 = data.m2_curve2_upper||[];

  console.log(c1_m1);

  const allPeriods = [...new Set([
    ...c1_m1.map(d=>d.period), ...c2_m1.map(d=>d.period),
    ...c1_m2.map(d=>d.period), ...c2_m2.map(d=>d.period),
    ...realPts.map(d=>d.period)
  ])].sort();

  const realMap = toMap(realPts);
  const c1m1Map = toMap(c1_m1), c2m1Map = toMap(c2_m1);
  const c1m2Map = toMap(c1_m2), c2m2Map = toMap(c2_m2);
  const loMap   = toMap(lo_m2), hiMap   = toMap(hi_m2);

  const m1split = splitCurve(c2_m1, realPeriods);
  const m2split = splitCurve(c2_m2, realPeriods);

  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById("myChart").getContext("2d");

  const gradM1 = ctx.createLinearGradient(0,0,0,420);
  gradM1.addColorStop(0,"rgba(255,132,0,0.18)"); gradM1.addColorStop(1,"rgba(255,132,0,0)");

  const gradM2 = ctx.createLinearGradient(0,0,0,420);
  gradM2.addColorStop(0,"rgba(200,200,200,0.12)"); gradM2.addColorStop(1,"rgba(200,200,200,0)");

  const datasets = [];

  datasets.push({
    label:"Données réelles",
    data: allPeriods.map(l=>realMap[l]??null),
    borderColor:"rgba(255,255,255,0.9)",
    backgroundColor:"rgba(255,255,255,0.05)",
    borderWidth:2.5, pointRadius:4, pointHoverRadius:7,
    pointBackgroundColor:"#fff",
    tension:0.3, fill:false, spanGaps:false, order:0,
  });

  if (model==="m1"||model==="both") {
    datasets.push({
      label:"M1 · Prédiction (historique)",
      data: allPeriods.map(l=>c1m1Map[l]??null),
      borderColor:"rgba(255,132,0,0.75)", backgroundColor:gradM1,
      borderWidth:1.8, pointRadius:2, pointHoverRadius:5,
      pointBackgroundColor:"#ff8400",
      tension:0.35, fill:true, spanGaps:false, order:2,
    });
    /*datasets.push({
      label:"M1 · Réel observé",
      data: allPeriods.map(l=>{ const i=c2_m1.findIndex(d=>d.period===l); return i>=0?m1split.realPart[i]:null; }),
      borderColor:"rgba(255,150,30,0.85)", borderWidth:2,
      pointRadius:0, pointHoverRadius:5,
      tension:0.3, fill:false, spanGaps:false, order:1,
    });*/
    datasets.push({
      label:"M1 · Continuation (réel→prédit)",
      data: allPeriods.map(l=>{ const i=c2_m1.findIndex(d=>d.period===l); return i>=0?m1split.predPart[i]:null; }),
      borderColor:"rgba(255,132,0,0.95)", borderDash:[6,4], borderWidth:2,
      pointRadius:2, pointHoverRadius:5, pointBackgroundColor:"#ff8400",
      tension:0.3, fill:false, spanGaps:false, order:2,
    });
  }

  if (model==="m2"||model==="both") {
    datasets.push({
      label:"M2 · Intervalle 90%",
      data: allPeriods.map(l=>hiMap[l]??null),
      borderColor:"rgba(255,179,71,0.5)", borderWidth:1,
      backgroundColor:"rgba(255,150,30,0.22)",
      pointRadius:0, pointHoverRadius:0,
      tension:0.3, fill:"+1", spanGaps:false, order:5,
    });
    datasets.push({
      label:"M2 · Intervalle 10%",
      data: allPeriods.map(l=>loMap[l]??null),
      borderColor:"rgba(255,179,71,0.5)", borderWidth:1,
      backgroundColor:"rgba(255,150,30,0.22)",
      pointRadius:0, pointHoverRadius:0,
      tension:0.3, fill:false, spanGaps:false, order:5,
    });
    datasets.push({
      label:"M2 · Prédiction (historique)",
      data: allPeriods.map(l=>c1m2Map[l]??null),
      borderColor:"rgba(200,200,200,0.65)", backgroundColor:gradM2,
      borderWidth:1.8, pointRadius:2, pointHoverRadius:5,
      pointBackgroundColor:"#ccc",
      tension:0.35, fill:true, spanGaps:false, order:3,
    });
    datasets.push({
      label:"M2 · Continuation (réel→prédit)",
      data: allPeriods.map(l=>{ const i=c2_m2.findIndex(d=>d.period===l); return i>=0?m2split.predPart[i]:null; }),
      borderColor:"rgba(200,200,200,0.9)", borderDash:[6,4], borderWidth:2,
      pointRadius:2, pointHoverRadius:5, pointBackgroundColor:"#ccc",
      tension:0.3, fill:false, spanGaps:false, order:3,
    });
  }

  chartInstance = new Chart(ctx, {
    type:"line",
    data:{ labels:allPeriods, datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:"index", intersect:false },
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor:"#141414", borderColor:"#2a2a2a", borderWidth:1,
          titleColor:"#f0f0f0", bodyColor:"#888",
          titleFont:{ family:"'Syne',sans-serif", weight:"700" },
          bodyFont:{ family:"'DM Mono',monospace", size:12 },
          padding:12,
          filter: item => item.parsed.y !== null,
          callbacks:{ label: c => `  ${c.dataset.label}: ${fmt(c.parsed.y)}` }
        }
      },
      scales:{
        x:{ grid:{ color:"rgba(255,255,255,0.04)" }, ticks:{ color:"#555", font:{family:"'DM Mono',monospace",size:11}, maxTicksLimit:12, maxRotation:45 } },

      }
    }

  // Legend checkboxes
  const legendDefs = [
    { id:"cb-real", label:"Réel",            cls:"c-real", show:true,
      swatch:`<span class="legend-swatch" style="background:#fff"></span>`,
      datasetLabels:["Données réelles"] },
    { id:"cb-m1h",  label:"M1 historique",   cls:"c-m1h",  show:model==="m1"||model==="both",
      swatch:`<span class="legend-swatch" style="background:var(--m1color)"></span>`,

    { id:"cb-m1c",  label:"M1 continuation", cls:"c-m1c",  show:model==="m1"||model==="both",

      swatch:`<span class="legend-swatch" style="background:#aaa"></span>`,
      datasetLabels:["M2 · Prédiction (historique)"] },
    { id:"cb-m2c",  label:"M2 continuation", cls:"c-m2c",  show:model==="m2"||model==="both",

      swatch:`<span class="legend-swatch band" style="background:rgba(255,150,30,0.6)"></span>`,
      datasetLabels:["M2 · Intervalle 90%","M2 · Intervalle 10%"] },
  ];

  const legendEl = document.getElementById("dynamic-legend");
  legendEl.innerHTML = "";
  legendDefs.forEach(def => {
    if (!def.show) return;
    const uid = def.id+"-"+Date.now();
    legendEl.innerHTML += `
      <input type="checkbox" class="legend-cb" id="${uid}" checked
             data-labels='${JSON.stringify(def.datasetLabels)}'
             onchange="toggleSeries(this)"/>
      <label class="legend-item ${def.cls}" for="${uid}">${def.swatch}${def.label}</label>`;
  });

  // Stats
  const m1Last = c2_m1.length ? c2_m1[c2_m1.length-1].value : null;
  const m2Last = c2_m2.length ? c2_m2[c2_m2.length-1].value : null;
  document.getElementById("stat-real").textContent    = realPts.length;
  document.getElementById("stat-m1-last").textContent = fmt(m1Last);
  document.getElementById("stat-m2-last").textContent = fmt(m2Last);
  document.getElementById("stat-periods").textContent = allPeriods.length;
  document.getElementById("stat-m1-card").style.display = model==="m2"?"none":"";
  document.getElementById("stat-m2-card").style.display = model==="m1"?"none":"";

  document.getElementById("chart-title").textContent = `Rep: ${data.rep_code}`;
  document.getElementById("chart-meta").textContent  =
    `${allPeriods[0]??""} → ${allPeriods[allPeriods.length-1]??""} · ${allPeriods.length} periods`;
}

// ═══════════════════════════════════════════════════════════
//  TOGGLE SERIES
// ═══════════════════════════════════════════════════════════
function toggleSeries(checkbox) {
  if (!chartInstance) return;
  const labels  = JSON.parse(checkbox.dataset.labels);
  const visible = checkbox.checked;
  chartInstance.data.datasets.forEach((ds,i) => {
    if (labels.includes(ds.label)) chartInstance.setDatasetVisibility(i, visible);
  });
  chartInstance.update();
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  // 1. Peek at URL params BEFORE building selects so future years are included
  const params    = new URLSearchParams(window.location.search);
  let deepDomain     = params.get("domain");
  const deepStartYear  = params.get("start_year") ? parseInt(params.get("start_year")) : null;
  const deepEndYear    = params.get("end_year")   ? parseInt(params.get("end_year"))   : null;

  // Pass overrides so the year <select> options span the right range
  populateDates(
    deepStartYear && deepEndYear
      ? { start_year: deepStartYear, start_month: 1,
          end_year:   deepEndYear,   end_month:   12 }
      : {}
  );

  // 2. Load products + full rep list
  await initProducts();

  // 3. If deep-link params present, select the domain's reps and show banner
  if (deepDomain) {
    if (deepDomain.includes('%')) {
        deepDomain = decodeURIComponent(deepDomain);
    }
    const res  = await fetch("/get_reps_by_domain?domain=" + encodeURIComponent(deepDomain));
    const reps = await res.json();

    if (reps.length) {
      // Ensure all domain reps exist in state.reps.all
      reps.forEach(r => { if (!state.reps.all.includes(r)) state.reps.all.push(r); });
      state.reps.all.sort();

      // Select exactly the domain's reps
      state.reps.selected.clear();
      reps.forEach(r => state.reps.selected.add(r));
      renderList('rep');
      renderTags('rep');

      // Show context banner
      document.getElementById("banner-domain").textContent =
        decodeURIComponent(deepDomain);
      document.getElementById("banner-period").textContent =
        deepStartYear && deepEndYear ? `${deepStartYear} → ${deepEndYear}` : "";
      document.getElementById("context-banner").classList.add("visible");

      // 4. Auto-run the forecast
      runForecast();
    }
  }
}

init();
